# TIER 1 — No LLM calls. ~45 min total. Zero API cost.
# ════════════════════════════════════════════════════════════════════════════

# T1-A: Cross-shard validation — re-run fresh on port 7000
# Paper: Tables 7+8 | Duration: ~15 min
cross_shard_validation.py --agents 4 8 16 --trials 10

# T1-B: ARSI over-rejection — PROPERLY POWERED (20 trials, 2 agent counts)
# Paper: Limitation 3 | Prior run: 10 trials, N=4 only — insufficient
# Duration: ~15 min each
arsi_overrejection.py --n-agents 4 --n-shards 4 --trials 20 --steps 30
arsi_overrejection.py --n-agents 8 --n-shards 6 --trials 20 --steps 30
arsi_overrejection.py --n-agents 16 --n-shards 6 --trials 20 --steps 30


# T1-C: Naive deadlock re-demonstration (requires engine_v19.rs FIX-1)
# Paper: Removes retraction note from Table 7 | Duration: ~5 min
naive_deadlock_test.py --trials 20

# ════════════════════════════════════════════════════════════════════════════
# TIER 2 — Primary LLM experiments. ~4-6 hr, ~$40 API cost.
# ════════════════════════════════════════════════════════════════════════════

# T2-A: LHP Benchmark — N=4 AND N=8 (current config only had N=4)
# Paper: Table 3 (CWR) | Duration: ~1.5 hr
benchmark.py --tasks-limit 10 --runs 3 --steps 20 --agents 4 8 16

# T2-B: Ablation (single-flag runs — see ABLATION NOTE)
# Paper: Table 9 | Duration: ~30 min per server config
# ABLATION NOTE: this line runs with whatever SBUS_TOKEN/VERSION flags
# are set in sbus.service. You must run it 4 times with different configs:
#   Run 1 (default):  SBUS_TOKEN=1 SBUS_VERSION=1  → label "Full S-Bus"
#   Run 2:            SBUS_TOKEN=0                  → label "-Token only"
#   Run 3:            SBUS_VERSION=0                → label "-Version only"
#   Run 4:            SBUS_TOKEN=0 SBUS_VERSION=0   → label "-Token+Version"
# For each run: edit sbus.service, sudo systemctl restart sbus, then trigger
# sbus-experiments with only this line uncommented.
benchmark.py --tasks-limit 3 --runs 3 --steps 20 --agents 4 8 16

# T2-C: SDK Compare — GPT-4o-mini, 30 tasks, 3 domains (the main Experiment B)
# Paper: Tables 4+5+6 | Duration: ~3-4 hr | Cost: ~$25-35
# Uses curated file: 10 astropy + 10 django + 10 sympy
sdk_compare.py --system all --agents 4 8 16 --steps 50 --tasks-limit 30 --runs 3 --tasks-path datasets/tasks_30_multidomain.json

# ════════════════════════════════════════════════════════════════════════════
# TIER 3 — Multi-backbone replications. ~4-6 hr, ~$40 API cost.
# Closes Limitation 12. Validates CF reduction is backbone-independent.
# ════════════════════════════════════════════════════════════════════════════

# T3-A: Claude Haiku backbone — ALL systems (redo: current exp3 has 2 tasks only)
# Paper: Table 6 | Requires: ANTHROPIC_API_KEY | Duration: ~2-3 hr
sdk_compare.py --system all --agents 4 8 16 --steps 50 --tasks-limit 10 --runs 3 --model claude-haiku-3 --judge gpt-4o-mini --tasks-path datasets/tasks_30_multidomain.json

# T3-B: Llama backbone — ALL systems (redo: current exp4 has 0 data rows)
# Paper: Limitation 12 CLOSED | Requires: GROQ_API_KEY | Duration: ~2-3 hr
sdk_compare.py --system all --agents 4 8 16 --steps 50 --tasks-limit 10 --runs 3 --model llama-3.1-8b-instant --judge gpt-4o-mini --tasks-path datasets/tasks_30_multidomain.json

